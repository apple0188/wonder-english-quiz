<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>국민영어법 240문장 마스터</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#4A90D9;--primary-light:#6BA8E8;--primary-dark:#3571B5;--success:#27AE60;--warning:#F39C12;--danger:#E74C3C;--bg:#F5F7FA;--card:#FFFFFF;--text:#2C3E50;--text-light:#7F8C8D;--shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-lg:0 8px 30px rgba(0,0,0,0.12);--radius:16px;--radius-sm:10px}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
body{position:relative}
.screen{display:none;min-height:100vh;padding:16px;padding-bottom:80px;animation:fadeIn .3s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes ripple{0%{transform:scale(.8);opacity:1}100%{transform:scale(2.5);opacity:0}}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px var(--primary)}50%{box-shadow:0 0 25px var(--primary),0 0 50px rgba(74,144,217,.3)}}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes starPop{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.3) rotate(10deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}

.header{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;margin-bottom:16px}
.header h1{font-size:20px;font-weight:800;color:var(--primary)}
.header-icon{width:40px;height:40px;border-radius:50%;background:var(--card);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-size:18px;color:var(--text-light);transition:all .2s}
.header-icon:active{transform:scale(.9)}

.title-section{text-align:center;padding:20px 0 10px}
.title-section h1{font-size:26px;font-weight:900;color:var(--text);margin-bottom:6px}
.title-section p{font-size:14px;color:var(--text-light)}
.title-logo{font-size:48px;margin-bottom:8px}

.stats-bar{display:flex;gap:10px;margin:16px 0;justify-content:center}
.stat-item{background:var(--card);border-radius:var(--radius-sm);padding:12px 20px;box-shadow:var(--shadow);text-align:center;flex:1;max-width:150px}
.stat-item .num{font-size:22px;font-weight:800;color:var(--primary)}
.stat-item .label{font-size:11px;color:var(--text-light);margin-top:2px}

.lesson-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:8px 0}
.lesson-btn{background:var(--card);border:2px solid transparent;border-radius:var(--radius);padding:16px 8px;text-align:center;cursor:pointer;box-shadow:var(--shadow);transition:all .2s;position:relative;overflow:hidden}
.lesson-btn:active{transform:scale(.95);box-shadow:var(--shadow-lg)}
.lesson-btn .lesson-num{font-size:13px;font-weight:700;color:var(--primary)}
.lesson-btn .lesson-title{font-size:11px;color:var(--text-light);margin-top:4px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.lesson-btn.completed{border-color:var(--success)}
.lesson-btn.completed::after{content:'';position:absolute;top:6px;right:6px;width:18px;height:18px;background:var(--success);border-radius:50%;display:flex;align-items:center;justify-content:center}
.lesson-btn.completed::before{content:'\\2713';position:absolute;top:7px;right:7px;width:16px;height:16px;color:#fff;font-size:11px;font-weight:700;z-index:1;display:flex;align-items:center;justify-content:center}
.lesson-btn .best-score{font-size:10px;color:var(--success);font-weight:600;margin-top:4px}

.mode-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px}
.mode-title{font-size:20px;font-weight:800;margin-bottom:8px;text-align:center}
.mode-subtitle{font-size:14px;color:var(--text-light);margin-bottom:20px;text-align:center}
.mode-btn{width:100%;max-width:340px;padding:24px 20px;background:var(--card);border:2px solid var(--primary);border-radius:var(--radius);cursor:pointer;transition:all .2s;text-align:left}
.mode-btn:active{transform:scale(.97);background:var(--primary);color:#fff}
.mode-btn:active .mode-btn-desc{color:rgba(255,255,255,.8)}
.mode-btn h3{font-size:17px;font-weight:700;color:var(--primary);margin-bottom:6px}
.mode-btn:active h3{color:#fff}
.mode-btn .mode-btn-desc{font-size:13px;color:var(--text-light);line-height:1.4}
.mode-btn .mode-icon{font-size:28px;margin-bottom:8px}

.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;background:var(--card);border-radius:20px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;box-shadow:var(--shadow);transition:all .2s}
.back-btn:active{transform:scale(.95)}

.game-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.progress-bar-container{width:100%;height:6px;background:#E8ECF1;border-radius:3px;margin:8px 0 16px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:3px;transition:width .4s ease}
.q-counter{font-size:14px;font-weight:700;color:var(--text-light)}

.prompt-card{background:var(--card);border-radius:var(--radius);padding:28px 20px;margin:12px 0;box-shadow:var(--shadow-lg);text-align:center;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:slideUp .4s ease}
.prompt-card .korean-text{font-size:22px;font-weight:700;line-height:1.5;color:var(--text)}
.prompt-card .english-hint{font-size:14px;color:var(--text-light);margin-top:8px}
.prompt-card .mode-label{font-size:12px;color:var(--primary);font-weight:600;margin-bottom:12px;background:rgba(74,144,217,.1);padding:4px 12px;border-radius:12px;display:inline-block}
.play-sound-btn{width:64px;height:64px;border-radius:50%;background:var(--primary);border:none;color:#fff;font-size:28px;cursor:pointer;margin:12px 0;box-shadow:0 4px 15px rgba(74,144,217,.3);transition:all .2s}
.play-sound-btn:active{transform:scale(.9)}

.timer-section{display:flex;justify-content:center;margin:16px 0}
.timer-circle{width:80px;height:80px;position:relative}
.timer-circle svg{transform:rotate(-90deg)}
.timer-circle circle{fill:none;stroke-width:4}
.timer-circle .bg{stroke:#E8ECF1}
.timer-circle .fg{stroke:var(--primary);stroke-linecap:round;transition:stroke-dashoffset .1s linear,stroke .3s}
.timer-circle .fg.warning{stroke:var(--warning)}
.timer-circle .fg.danger{stroke:var(--danger)}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:800;color:var(--text)}

.mic-section{display:flex;flex-direction:column;align-items:center;gap:8px;margin:16px 0}
.mic-btn{width:80px;height:80px;border-radius:50%;background:var(--primary);border:none;color:#fff;font-size:32px;cursor:pointer;position:relative;transition:all .2s;box-shadow:0 4px 20px rgba(74,144,217,.3)}
.mic-btn:active{transform:scale(.9)}
.mic-btn.listening{background:var(--danger);animation:pulse 1s infinite}
.mic-btn.listening::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:3px solid var(--danger);animation:ripple 1.5s infinite}
.mic-btn.listening::after{content:'';position:absolute;inset:-16px;border-radius:50%;border:2px solid var(--danger);animation:ripple 1.5s infinite .3s}
.mic-label{font-size:13px;color:var(--text-light);font-weight:500}
.skip-btn{padding:10px 24px;border:1px solid #ddd;background:transparent;border-radius:20px;font-size:13px;color:var(--text-light);cursor:pointer;margin-top:8px;transition:all .2s}
.skip-btn:active{background:#f0f0f0}

.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;animation:fadeIn .2s}
.result-overlay.active{display:flex}
.result-card{background:var(--card);border-radius:var(--radius);padding:32px 24px;margin:16px;max-width:340px;width:100%;text-align:center;animation:slideUp .3s ease;box-shadow:var(--shadow-lg)}
.result-card .result-emoji{font-size:48px;margin-bottom:12px}
.result-card .result-title{font-size:20px;font-weight:800;margin-bottom:8px}
.result-card .result-detail{font-size:14px;color:var(--text-light);margin-bottom:6px;line-height:1.5}
.result-card .heard-text{background:#f0f4f8;border-radius:8px;padding:10px;margin:10px 0;font-size:13px;color:var(--text)}
.result-card .correct-text{color:var(--success);font-weight:600}
.result-card .wrong-text{color:var(--danger);font-weight:600}
.result-next-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;transition:all .2s}
.result-next-btn:active{transform:scale(.97)}

.stars-container{display:flex;justify-content:center;gap:6px;margin:12px 0}
.star{font-size:36px;opacity:.2;transition:all .3s}
.star.active{opacity:1;animation:starPop .5s ease forwards}
.star:nth-child(2).active{animation-delay:.15s}
.star:nth-child(3).active{animation-delay:.3s}

.final-screen{text-align:center;padding:20px 0}
.final-score-circle{width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));margin:20px auto;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;box-shadow:0 8px 30px rgba(74,144,217,.3)}
.final-score-circle .score-num{font-size:40px;font-weight:900}
.final-score-circle .score-total{font-size:14px;opacity:.8}
.final-stars{display:flex;justify-content:center;gap:4px;margin:12px 0}
.final-stars .star{font-size:28px}

.sentence-review{margin:20px 0;text-align:left}
.sentence-review h3{font-size:15px;font-weight:700;margin-bottom:10px;color:var(--text)}
.review-item{background:var(--card);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;box-shadow:var(--shadow);border-left:4px solid var(--success)}
.review-item.missed{border-left-color:var(--danger);background:#FFF5F5}
.review-item .ri-num{font-size:11px;color:var(--text-light);font-weight:600}
.review-item .ri-kr{font-size:14px;font-weight:600;margin:4px 0 2px}
.review-item .ri-en{font-size:13px;color:var(--text-light)}
.review-item .ri-score{float:right;font-size:12px;font-weight:700;padding:2px 8px;border-radius:8px;background:rgba(39,174,96,.1);color:var(--success)}
.review-item.missed .ri-score{background:rgba(231,76,60,.1);color:var(--danger)}

.action-btns{display:flex;flex-direction:column;gap:10px;margin:20px 0;align-items:center}
.action-btn{width:100%;max-width:320px;padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;border:none}
.action-btn:active{transform:scale(.97)}
.action-btn.primary{background:var(--primary);color:#fff}
.action-btn.secondary{background:var(--card);color:var(--primary);border:2px solid var(--primary)}
.action-btn.kakao{background:#FEE500;color:#391B1B}
.action-btn.outline{background:transparent;color:var(--text-light);border:1px solid #ddd}

.settings-modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center}
.settings-modal.active{display:flex}
.settings-panel{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;padding:24px;width:100%;max-width:500px;animation:slideUp .3s ease}
.settings-panel h3{font-size:18px;font-weight:700;margin-bottom:16px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0}
.setting-row label{font-size:14px;font-weight:500}
.speed-btns{display:flex;gap:6px}
.speed-btn{padding:6px 14px;border-radius:16px;border:1px solid #ddd;background:transparent;font-size:13px;cursor:pointer;transition:all .2s}
.speed-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.settings-close{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;margin-top:16px}

.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;top:-10px;animation:confetti-fall 2.5s linear forwards}

.empty-state{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}

@media(min-width:500px){
.lesson-grid{grid-template-columns:repeat(4,1fr)}
.screen{max-width:500px;margin:0 auto}
}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="homeScreen" class="screen active">
<div class="header">
<h1>국민영어법</h1>
<button class="header-icon" onclick="openSettings()">&#9881;</button>
</div>
<div class="title-section">
<div class="title-logo">&#127891;</div>
<h1>240문장 마스터</h1>
<p>하루 10문장, 24일이면 완성!</p>
</div>
<div class="stats-bar">
<div class="stat-item"><div class="num" id="statCompleted">0</div><div class="label">완료한 강</div></div>
<div class="stat-item"><div class="num" id="statTotalScore">0</div><div class="label">총 점수</div></div>
<div class="stat-item"><div class="num" id="statStreak">0</div><div class="label">연속 학습</div></div>
</div>
<div class="lesson-grid" id="lessonGrid"></div>
</div>

<!-- MODE SELECT SCREEN -->
<div id="modeScreen" class="screen">
<button class="back-btn" onclick="showScreen('homeScreen')">&#8592; 돌아가기</button>
<div class="mode-screen">
<div class="mode-title" id="modeTitle">1강</div>
<div class="mode-subtitle">학습 모드를 선택하세요</div>
<button class="mode-btn" onclick="startGame('listen')">
<div class="mode-icon">&#127911;</div>
<h3>듣고 따라 말하기</h3>
<div class="mode-btn-desc">영어 문장을 듣고 따라 말해보세요. 발음과 억양을 연습합니다.</div>
</button>
<button class="mode-btn" onclick="startGame('translate')">
<div class="mode-icon">&#127463;&#127479;</div>
<h3>한국어 보고 영어 말하기</h3>
<div class="mode-btn-desc">한국어 문장을 보고 영어로 말해보세요. 영작 실력을 키웁니다.</div>
</button>
</div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
<div class="game-header">
<button class="back-btn" onclick="confirmQuit()">&#8592;</button>
<span class="q-counter" id="qCounter">1/10</span>
<button class="header-icon" onclick="openSettings()" style="width:36px;height:36px;font-size:16px">&#9881;</button>
</div>
<div class="progress-bar-container"><div class="progress-bar-fill" id="progressBar"></div></div>

<div class="prompt-card" id="promptCard">
<div class="mode-label" id="gameModeLabel"></div>
<div class="korean-text" id="promptText"></div>
<button class="play-sound-btn" id="playSoundBtn" onclick="playCurrentTTS()" style="display:none">&#128266;</button>
</div>

<div class="timer-section">
<div class="timer-circle">
<svg width="80" height="80"><circle class="bg" cx="40" cy="40" r="36"/><circle class="fg" id="timerCircle" cx="40" cy="40" r="36" stroke-dasharray="226.2" stroke-dashoffset="0"/></svg>
<div class="timer-text" id="timerText">5</div>
</div>
</div>

<div class="mic-section">
<button class="mic-btn" id="micBtn" onclick="toggleMic()">&#127908;</button>
<div class="mic-label" id="micLabel">마이크를 눌러 말하세요</div>
<button class="skip-btn" onclick="skipQuestion()">건너뛰기 &#8594;</button>
</div>
</div>

<!-- QUESTION RESULT OVERLAY -->
<div class="result-overlay" id="resultOverlay">
<div class="result-card">
<div class="result-emoji" id="resultEmoji"></div>
<div class="result-title" id="resultTitle"></div>
<div class="stars-container" id="resultStars"></div>
<div class="result-detail" id="resultDetail"></div>
<div class="heard-text" id="heardText"></div>
<div class="result-detail"><span class="correct-text" id="correctAnswer"></span></div>
<button class="result-next-btn" onclick="nextQuestion()">다음 문장 &#8594;</button>
</div>
</div>

<!-- FINAL RESULTS SCREEN -->
<div id="finalScreen" class="screen">
<div class="final-screen">
<div style="font-size:14px;color:var(--text-light);margin-bottom:4px" id="finalLessonLabel"></div>
<h2 style="font-size:22px;font-weight:800">학습 결과</h2>
<div class="final-score-circle">
<div class="score-num" id="finalScoreNum">0</div>
<div class="score-total">/ 30</div>
</div>
<div class="final-stars" id="finalStars"></div>
<div style="font-size:15px;font-weight:600;color:var(--text);margin:8px 0" id="finalMessage"></div>
<div class="sentence-review" id="sentenceReview"></div>
<div class="action-btns">
<button class="action-btn primary" id="retryMissedBtn" onclick="retryMissed()">틀린 문장 다시 도전하기</button>
<button class="action-btn secondary" onclick="retryAll()">전체 다시 도전하기</button>
<button class="action-btn kakao" onclick="shareKakao()">&#128172; 카카오톡으로 공유하기</button>
<button class="action-btn outline" onclick="showScreen('homeScreen');updateHomeStats()">홈으로 돌아가기</button>
</div>
</div>
</div>

<!-- SETTINGS MODAL -->
<div class="settings-modal" id="settingsModal">
<div class="settings-panel">
<h3>&#9881; 설정</h3>
<div class="setting-row">
<label>TTS 속도</label>
<div class="speed-btns">
<button class="speed-btn" data-speed="0.7" onclick="setSpeed(0.7,this)">느리게</button>
<button class="speed-btn active" data-speed="1" onclick="setSpeed(1,this)">보통</button>
<button class="speed-btn" data-speed="1.3" onclick="setSpeed(1.3,this)">빠르게</button>
</div>
</div>
<div class="setting-row">
<label>타이머 시간</label>
<div class="speed-btns">
<button class="speed-btn" data-time="5" onclick="setTimerDuration(5,this)">5초</button>
<button class="speed-btn active" data-time="7" onclick="setTimerDuration(7,this)">7초</button>
<button class="speed-btn" data-time="10" onclick="setTimerDuration(10,this)">10초</button>
</div>
</div>
<button class="settings-close" onclick="closeSettings()">닫기</button>
</div>
</div>

<!-- CONFETTI CONTAINER -->
<div class="confetti-container" id="confettiContainer"></div>

<script>

// === LOCALSTORAGE ===
function loadProgress(){
try{return JSON.parse(localStorage.getItem('eng240_progress'))||{}}catch(e){return{}}
}
function saveProgress(lessonNum,score,details){
const p=loadProgress();
if(!p[lessonNum]||score>p[lessonNum].score){
p[lessonNum]={score,details,date:Date.now()};
}
localStorage.setItem('eng240_progress',JSON.stringify(p));
}
function getStreak(){
const p=loadProgress();
const dates=Object.values(p).map(v=>new Date(v.date).toDateString());
const unique=[...new Set(dates)].sort((a,b)=>new Date(b)-new Date(a));
if(unique.length===0)return 0;
let streak=0;
let check=new Date();
for(let i=0;i<unique.length;i++){
const d=new Date(unique[i]).toDateString();
if(d===check.toDateString()){streak++;check.setDate(check.getDate()-1);}
else if(i===0){check.setDate(check.getDate()-1);if(d===check.toDateString()){streak++;check.setDate(check.getDate()-1);}else break;}
else break;
}
return streak;
}

// === AUDIO ===
function getAudioCtx(){
if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
return audioCtx;
}
function playTone(freq,dur,type='sine',vol=0.15){
try{
const ctx=getAudioCtx();
const o=ctx.createOscillator();
const g=ctx.createGain();
o.type=type;o.frequency.value=freq;
g.gain.setValueAtTime(vol,ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
o.connect(g);g.connect(ctx.destination);
o.start();o.stop(ctx.currentTime+dur);
}catch(e){}
}
function playCorrectSound(){
playTone(523,.1,'sine',.12);
setTimeout(()=>playTone(659,.1,'sine',.12),100);
setTimeout(()=>playTone(784,.15,'sine',.12),200);
}

setTimeout(()=>playTone(1047,.2,'sine',.12),240);
setTimeout(()=>playTone(784,.08,'sine',.08),400);
setTimeout(()=>playTone(1047,.3,'sine',.1),480);
}

// === START GAME ===
function startGame(mode,retryIndices){
currentMode=mode;
currentQIndex=0;
scores=[];
if(retryIndices){
currentQuestions=retryIndices.map(i=>ALL_SENTENCES[i]);
}else{
const start=(currentLesson-1)*10;
currentQuestions=ALL_SENTENCES.slice(start,start+10);

// === GAME PLAY ===
function showQuestion(){
if(currentQIndex>=currentQuestions.length){showFinalResults();return;}
const q=currentQuestions[currentQIndex];
document.getElementById('qCounter').textContent=`${currentQIndex+1}/${currentQuestions.length}`;
document.getElementById('progressBar').style.width=((currentQIndex)/currentQuestions.length*100)+'%';

const modeLabel=document.getElementById('gameModeLabel');
const promptText=document.getElementById('promptText');
const playBtn=document.getElementById('playSoundBtn');

if(currentMode==='listen'){
modeLabel.textContent='듣고 따라 말하기';
promptText.textContent='문장을 듣고 따라 말하세요';
playBtn.style.display='block';
setTimeout(()=>playCurrentTTS(),400);
}else{
modeLabel.textContent='한국어 보고 영어 말하기';
promptText.textContent=q.kr;
playBtn.style.display='none';
}

document.getElementById('micBtn').className='mic-btn';
document.getElementById('micLabel').textContent='마이크를 눌러 말하세요';

startTimer();
}

function playCurrentTTS(){
const q=currentQuestions[currentQIndex];
if(!q)return;
// For sentences with " / ", pick the first part for TTS
let text=q.en;
if(text.includes(' / '))text=text.split(' / ')[0];
const u=new SpeechSynthesisUtterance(text);
u.lang='en-US';
u.rate=ttsSpeed;
// Try to get a good English voice
const voices=speechSynthesis.getVoices();
const enVoice=voices.find(v=>v.lang==='en-US'&&v.name.includes('Samantha'))||
voices.find(v=>v.lang==='en-US'&&!v.name.includes('Google'))||
voices.find(v=>v.lang.startsWith('en'));
if(enVoice)u.voice=enVoice;
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

// === TIMER ===
function resetTimer(){
clearInterval(timerInterval);
document.getElementById('timerText').textContent=maxTime;
const circle=document.getElementById('timerCircle');
circle.style.strokeDashoffset='0';
circle.className='fg';
}
function startTimer(){
timerStart=Date.now();
const circumference=226.2;
timerInterval=setInterval(()=>{
const elapsed=(Date.now()-timerStart)/1000;
const remaining=Math.max(0,maxTime-elapsed);
document.getElementById('timerText').textContent=Math.ceil(remaining);
const offset=circumference*(1-remaining/maxTime);
const circle=document.getElementById('timerCircle');
circle.style.strokeDashoffset=offset;
if(remaining<=2){circle.className='fg danger';if(remaining>0&&remaining<=2&&Math.ceil(remaining)!==Math.ceil(remaining+0.1))playTickSound();}
else if(remaining<=4){circle.className='fg warning';}
else{circle.className='fg';}
if(remaining<=0){
clearInterval(timerInterval);
if(isListening)stopListening();
// Auto-skip if not answered
if(scores[currentQIndex]===-1){
scores[currentQIndex]=0;
showQuestionResult(0,null);
}
}
},50);
}
function getElapsed(){return(Date.now()-timerStart)/1000;}

// === SPEECH RECOGNITION ===
function toggleMic(){
if(isListening){stopListening();return;}
startListening();
}
function startListening(){
try{getAudioCtx().resume();}catch(e){}
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){alert('이 브라우저에서 음성인식을 지원하지 않습니다. Chrome 또는 Safari를 사용해주세요.');return;}
recognition=new SR();
recognition.lang='en-US';
recognition.interimResults=false;
recognition.maxAlternatives=3;
recognition.continuous=false;
recognition.onresult=(e)=>{
const heard=e.results[0][0].transcript;
processAnswer(heard);
};
recognition.onerror=(e)=>{
if(e.error==='no-speech'){
isListening=false;
document.getElementById('micBtn').className='mic-btn';
document.getElementById('micLabel').textContent='소리가 감지되지 않았어요. 다시 시도하세요.';
}else{
isListening=false;
document.getElementById('micBtn').className='mic-btn';
document.getElementById('micLabel').textContent='다시 시도하세요';
}
};
recognition.onend=()=>{
isListening=false;
document.getElementById('micBtn').className='mic-btn';
};
recognition.start();
isListening=true;
document.getElementById('micBtn').className='mic-btn listening';
document.getElementById('micLabel').textContent='듣고 있어요...';
}
function stopListening(){
if(recognition){recognition.stop();}
isListening=false;
document.getElementById('micBtn').className='mic-btn';
document.getElementById('micLabel').textContent='마이크를 눌러 말하세요';
}

// === ANSWER PROCESSING ===
function normalize(s){
return s.toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();
}
function similarity(a,b){
const na=normalize(a),nb=normalize(b);
if(na===nb)return 1;
const wa=na.split(' '),wb=nb.split(' ');
// Word-level Jaccard + order bonus
const setA=new Set(wa),setB=new Set(wb);
let intersection=0;
setA.forEach(w=>{if(setB.has(w))intersection++;});
const union=new Set([...wa,...wb]).size;
const jaccard=intersection/union;
// Levenshtein on full string
const len=Math.max(na.length,nb.length);
if(len===0)return 1;
const dist=levenshtein(na,nb);
const levSim=1-dist/len;
return Math.max(jaccard,levSim);
}
function levenshtein(a,b){
const m=a.length,n=b.length;
if(m===0)return n;if(n===0)return m;
const dp=Array.from({length:m+1},()=>Array(n+1).fill(0));
for(let i=0;i<=m;i++)dp[i][0]=i;
for(let j=0;j<=n;j++)dp[0][j]=j;
for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){
dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
}
return dp[m][n];
}
function checkAnswer(heard,correct){
// For sentences with " / ", check against both alternatives
const alternatives=correct.split(' / ');
let bestSim=0;
for(const alt of alternatives){
const sim=similarity(heard,alt);
if(sim>bestSim)bestSim=sim;
}
return bestSim;
}
function processAnswer(heard){
clearInterval(timerInterval);
const elapsed=getElapsed();
const q=currentQuestions[currentQIndex];
const sim=checkAnswer(heard,q.en);
let score=0;
if(sim>=0.7){
score=elapsed<=2?3:(elapsed<=5?2:1);
}else{
score=1; // attempted but wrong
if(sim<0.4)score=1;
}
// If similarity is very high
if(sim>=0.85)score=Math.max(score,elapsed<=2?3:2);
scores[currentQIndex]=score;
showQuestionResult(score,heard);
}
function skipQuestion(){
clearInterval(timerInterval);
if(isListening)stopListening();
scores[currentQIndex]=0;
showQuestionResult(0,null);
}

// === QUESTION RESULT ===
function showQuestionResult(score,heard){
const q=currentQuestions[currentQIndex];
const overlay=document.getElementById('resultOverlay');
const emoji=document.getElementById('resultEmoji');
const title=document.getElementById('resultTitle');
const stars=document.getElementById('resultStars');
const detail=document.getElementById('resultDetail');
const heardEl=document.getElementById('heardText');
const correctEl=document.getElementById('correctAnswer');

if(score===3){
emoji.textContent='🎉';title.textContent='Perfect!';
playPerfectSound();spawnConfetti();
}else if(score===2){
emoji.textContent='👍';title.textContent='Good!';
playCorrectSound();
}else if(score===1){
emoji.textContent='💪';title.textContent='다시 도전해보세요!';
playWrongSound();
}else{
emoji.textContent='⏭️';title.textContent='건너뛰었어요';
}

stars.innerHTML='';
for(let i=0;i<3;i++){
const s=document.createElement('span');
s.className='star'+(i<score?' active':'');
s.textContent='⭐';
stars.appendChild(s);
}

if(heard){
detail.textContent='내가 말한 것:';
heardEl.style.display='block';
heardEl.innerHTML=`"${heard}"`;
}else{
detail.textContent=score===0?'':'';
heardEl.style.display='none';
}

let enDisplay=q.en;
correctEl.innerHTML=`정답: ${enDisplay}`;
overlay.classList.add('active');
}
function nextQuestion(){
document.getElementById('resultOverlay').classList.remove('active');
currentQIndex++;
if(currentQIndex>=currentQuestions.length){
showFinalResults();
}else{
showQuestion();
}
}

// === FINAL RESULTS ===
function showFinalResults(){
clearInterval(timerInterval);
if(isListening)stopListening();
speechSynthesis.cancel();

const total=scores.reduce((a,b)=>a+Math.max(0,b),0);
const max=currentQuestions.length*3;
const pct=Math.round(total/max*100);

// Save progress
saveProgress(currentLesson,total,scores.map((s,i)=>({idx:((currentLesson-1)*10)+i,score:s})));

document.getElementById('finalLessonLabel').textContent=`${currentLesson}강 - ${LESSON_TOPICS[currentLesson-1]}`;
document.getElementById('finalScoreNum').textContent=total;
document.querySelector('.score-total').textContent=`/ ${max}`;

const starsDiv=document.getElementById('finalStars');
starsDiv.innerHTML='';
const starCount=pct>=90?3:pct>=60?2:pct>=30?1:0;
for(let i=0;i<3;i++){
const s=document.createElement('span');
s.className='star'+(i<starCount?' active':'');
s.textContent='⭐';
starsDiv.appendChild(s);
}

const msg=document.getElementById('finalMessage');
if(pct>=90)msg.textContent='훌륭해요! 완벽에 가까운 점수입니다!';
else if(pct>=70)msg.textContent='잘했어요! 조금만 더 연습하면 완벽해요!';
else if(pct>=50)msg.textContent='좋은 시작이에요! 틀린 문장을 복습해보세요.';
else msg.textContent='포기하지 마세요! 다시 도전해보세요!';

if(pct>=90){playCelebration();spawnConfetti(60);}

const review=document.getElementById('sentenceReview');
review.innerHTML='<h3>문장별 결과</h3>';
let hasMissed=false;
currentQuestions.forEach((q,i)=>{
const s=Math.max(0,scores[i]);
const missed=s<=1;
if(missed)hasMissed=true;
const div=document.createElement('div');
div.className='review-item'+(missed?' missed':'');
div.innerHTML=`<div class="ri-score">${s}점</div><div class="ri-num">#${q.n}</div><div class="ri-kr">${q.kr}</div><div class="ri-en">${q.en}</div>`;
review.appendChild(div);
});

document.getElementById('retryMissedBtn').style.display=hasMissed?'block':'none';
showScreen('finalScreen');
}

// === RETRY ===
function retryMissed(){
const missed=[];
currentQuestions.forEach((q,i)=>{
if(scores[i]<=1)missed.push(q.n-1);
});
if(missed.length===0)return;
startGame(currentMode,missed);
}
function retryAll(){
startGame(currentMode);
}

// === SHARE ===
function shareKakao(){
const total=scores.reduce((a,b)=>a+Math.max(0,b),0);
const max=currentQuestions.length*3;
const pct=Math.round(total/max*100);
const missed=[];
currentQuestions.forEach((q,i)=>{
if(scores[i]<=1)missed.push(`- ${q.kr} → ${q.en}`);
});
let text=`📚 국민영어법 240문장 마스터\n`;
text+=`📖 ${currentLesson}강: ${LESSON_TOPICS[currentLesson-1]}\n`;
text+=`🏆 점수: ${total}/${max} (${pct}%)\n`;
text+=`⭐ ${pct>=90?'완벽!':pct>=70?'잘했어요!':pct>=50?'좋은 시작!':'화이팅!'}\n`;
if(missed.length>0){
text+=`\n📝 복습이 필요한 문장:\n${missed.join('\n')}`;
}
text+=`\n\n나도 도전하기 👉 국민영어법 퀴즈게임`;

if(navigator.clipboard&&navigator.clipboard.writeText){
navigator.clipboard.writeText(text).then(()=>{
alert('결과가 클립보드에 복사되었습니다!\n카카오톡에 붙여넣기 해주세요. 📋');
}).catch(()=>{
fallbackCopy(text);
});
}else{
fallbackCopy(text);
}
}
function fallbackCopy(text){
const ta=document.createElement('textarea');
ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';
document.body.appendChild(ta);ta.select();
try{document.execCommand('copy');alert('결과가 클립보드에 복사되었습니다!\n카카오톡에 붙여넣기 해주세요. 📋');}
catch(e){alert('복사에 실패했습니다. 직접 복사해주세요.');}
document.body.removeChild(ta);
}

document.getElementById('settingsModal').classList.add('active');
}
function closeSettings(){
document.getElementById('settingsModal').classList.remove('active');
}
function setSpeed(s,btn){
ttsSpeed=s;
btn.parentElement.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

function setTimerDuration(t,btn){
maxTime=t;
btn.parentElement.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// === CONFIRM QUIT ===
function confirmQuit(){
if(confirm('학습을 중단하시겠어요?\n진행 상황이 저장되지 않습니다.')){
clearInterval(timerInterval);
if(isListening)stopListening();
speechSynthesis.cancel();
showScreen('modeScreen');
}
}

// === INIT ===
function init(){
// Load voices
if(speechSynthesis.onvoiceschanged!==undefined){
speechSynthesis.onvoiceschanged=()=>{};
}
speechSynthesis.getVoices();
buildLessonGrid();
updateHomeStats();
// Close settings on backdrop click
document.getElementById('settingsModal').addEventListener('click',function(e){
if(e.target===this)closeSettings();
});
}
init();
